<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtas - Galeria</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎞️</text></svg>">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #eeeeee;
            --accent: #ffcc00; /* Yellow for featured */
            --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --grid-size: 200px;
            --gap: 8px;
            --inv-bg: rgba(0, 0, 0, 0.85);
            --inv-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --border: #333333;
            --inv-bg: rgba(255, 255, 255, 0.85);
            --inv-text: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .controls-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-container {
            width: 100%;
        }

        #search-input {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .filters-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .filters-container::-webkit-scrollbar { display: none; }

        .filter-chip {
            padding: 6px 12px;
            border: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        #zoom-slider {
            width: 100%;
            cursor: pointer;
            height: 4px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }

        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: var(--text);
            border-radius: 50%;
        }

        button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Masonry Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--grid-size), 1fr));
            grid-auto-rows: calc(var(--grid-size) * 0.8);
            grid-auto-flow: dense;
            gap: var(--gap);
            padding: var(--gap);
        }

        .item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .item img, .item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sizes for puzzle effect */
        .item.featured {
            grid-column: span 2;
            grid-row: span 2;
            border: 3px solid var(--accent);
        }

        .item.capa {
            grid-column: 1 / -1;
            grid-row: span 2;
            margin: 20px 0;
        }

        /* Info & Icons */
        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px;
            font-size: calc(var(--grid-size) * 0.07);
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            pointer-events: none;
            word-break: break-word;
            z-index: 5;
        }

        .video-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: calc(var(--grid-size) * 0.12);
            color: #ff0000;
            z-index: 6;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .star-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: calc(var(--grid-size) * 0.15);
            color: var(--accent);
            z-index: 7;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .category-tag {
            position: absolute;
            top: 5px;
            left: 5px;
            padding: 2px 6px;
            font-size: calc(var(--grid-size) * 0.05);
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            border-radius: 2px;
            z-index: 10;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        #modal-content {
            max-width: 95%;
            max-height: 85%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #modal-content img, #modal-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #links-modal {
            background: var(--inv-bg);
            color: var(--inv-text);
            backdrop-filter: blur(5px);
        }

        #links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        #links-container a {
            color: var(--inv-text);
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1001;
        }

        @media (max-width: 600px) {
            :root { --grid-size: 140px; }
            .item.featured { grid-column: span 1; grid-row: span 1; }
            #links-container a { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="title">Curtas</div>
            <div class="controls-top">
                <button id="theme-toggle">🌓</button>
                <button id="menu-btn">Links</button>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="BUSCAR ARQUIVO...">
        </div>
        <div class="filters-container" id="filters-container">
            <div class="filter-chip active" data-cat="all">TODOS</div>
        </div>
        <input type="range" id="zoom-slider" min="120" max="500" value="200">
    </header>

    <div class="gallery" id="gallery"></div>

    <div id="modal" class="modal">
        <span class="close-modal">&times;</span>
        <div id="modal-content"></div>
        <div style="margin-top: 20px;">
            <button id="download-btn">Download</button>
        </div>
    </div>

    <div id="links-modal" class="modal">
        <span class="close-modal">&times;</span>
        <div id="links-container"></div>
    </div>

    <script>
        const CONFIG = {
            username: 'alexandre-dourado',
            repo: 'curtas',
            branch: 'main',
            basePath: 'files'
        };

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const linksModal = document.getElementById('links-modal');
        const modalContent = document.getElementById('modal-content');
        const linksContainer = document.getElementById('links-container');
        const filtersContainer = document.getElementById('filters-container');
        const searchInput = document.getElementById('search-input');
        const zoomSlider = document.getElementById('zoom-slider');
        const themeToggle = document.getElementById('theme-toggle');

        let allFiles = [];
        let selectedCats = new Set(['all']);
        let searchQuery = '';
        const categoryColors = {};

        function stringToColor(str) {
            if (categoryColors[str]) return categoryColors[str];
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            categoryColors[str] = `hsl(${Math.abs(hash % 360)}, 60%, 45%)`;
            return categoryColors[str];
        }

        async function init() {
            loadTheme();
            fetchLinks();
            await fetchFiles();
            renderFilters();
            renderGallery();
        }

        async function fetchLinks() {
            try {
                const res = await fetch('links.json');
                const links = await res.json();
                linksContainer.innerHTML = links.map(link => `<a href="${link.url}" target="_blank">${link.label}</a>`).join('');
            } catch (e) { console.error(e); }
        }

        async function fetchFiles() {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`);
                const data = await res.json();
                
                allFiles = data.tree.filter(item => 
                    item.type === 'blob' && item.path.startsWith(CONFIG.basePath + '/')
                ).map(item => {
                    const relativePath = item.path.replace(CONFIG.basePath + '/', '');
                    const pathParts = relativePath.split('/');
                    const filename = pathParts.pop();
                    const category = pathParts.length > 0 ? pathParts[0] : null;
                    const nameNoExt = filename.substring(0, filename.lastIndexOf('.')) || filename;
                    const ext = filename.split('.').pop().toLowerCase();
                    const rawUrl = `https://raw.githubusercontent.com/${CONFIG.username}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`;

                    // Destaque logic
                    const isFeatured = nameNoExt.startsWith('!');
                    const displayName = isFeatured ? nameNoExt.substring(1) : nameNoExt;
                    
                    // Capa logic
                    const isCapa = displayName.toLowerCase() === 'capa';

                    return { 
                        path: item.path, 
                        filename, 
                        name: displayName, 
                        category, 
                        ext, 
                        rawUrl, 
                        isFeatured, 
                        isCapa 
                    };
                }).sort((a, b) => {
                    // Capa first
                    if (a.isCapa && !b.isCapa) return -1;
                    if (!a.isCapa && b.isCapa) return 1;
                    return a.path.localeCompare(b.path, undefined, {numeric: true});
                });
            } catch (e) { console.error(e); }
        }

        function renderFilters() {
            const categories = [...new Set(allFiles.map(f => f.category).filter(Boolean))];
            filtersContainer.innerHTML = `<div class="filter-chip ${selectedCats.has('all') ? 'active' : ''}" data-cat="all">TODOS</div>` + 
                categories.map(cat => `<div class="filter-chip ${selectedCats.has(cat) ? 'active' : ''}" data-cat="${cat}">${cat}</div>`).join('');
            
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.onclick = () => {
                    const cat = chip.dataset.cat;
                    if (cat === 'all') {
                        selectedCats = new Set(['all']);
                    } else {
                        selectedCats.delete('all');
                        if (selectedCats.has(cat)) selectedCats.delete(cat);
                        else selectedCats.add(cat);
                        if (selectedCats.size === 0) selectedCats.add('all');
                    }
                    renderFilters();
                    renderGallery();
                };
            });
        }

        function renderGallery() {
            const filtered = allFiles.filter(file => {
                const matchesSearch = file.name.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCat = selectedCats.has('all') || selectedCats.has(file.category);
                return matchesSearch && matchesCat;
            });

            gallery.innerHTML = filtered.map(file => {
                const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(file.ext);
                const isVideo = ['mp4', 'webm', 'ogg', 'mov'].includes(file.ext);
                
                const thumbPath = file.path.replace(CONFIG.basePath + '/', 'thumbs/');
                const thumbName = thumbPath.substring(0, thumbPath.lastIndexOf('.')) + '.webp';
                const thumbUrl = `https://raw.githubusercontent.com/${CONFIG.username}/${CONFIG.repo}/${CONFIG.branch}/${thumbName}`;
                const fallbackUrl = isVideo ? `${file.rawUrl}#t=0.1` : file.rawUrl;

                const mediaHtml = (isImage || isVideo) ? 
                    `<img src="${thumbUrl}" onerror="this.onerror=null; this.src='${fallbackUrl}';" loading="lazy">` :
                    `<div class="placeholder">${file.ext.toUpperCase()}<br>${file.name}</div>`;

                const catTag = file.category ? `<span class="category-tag" style="background:${stringToColor(file.category)}">${file.category}</span>` : '';
                const videoIcon = isVideo ? `<div class="video-icon" style="color:${file.isFeatured ? '#fff' : '#ff0000'}">▶</div>` : '';
                const starBadge = file.isFeatured ? `<div class="star-badge">★</div>` : '';

                return `
                    <div class="item ${file.isFeatured ? 'featured' : ''} ${file.isCapa ? 'capa' : ''}" onclick="openModal('${file.path}')">
                        ${catTag}
                        ${mediaHtml}
                        ${videoIcon}
                        ${starBadge}
                        <div class="item-info">${file.name}</div>
                    </div>
                `;
            }).join('');
        }

        window.openModal = (path) => {
            const file = allFiles.find(f => f.path === path);
            if (!file) return;
            modalContent.innerHTML = '';
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(file.ext)) {
                modalContent.innerHTML = `<img src="${file.rawUrl}">`;
            } else if (['mp4', 'webm', 'ogg', 'mov'].includes(file.ext)) {
                modalContent.innerHTML = `<video src="${file.rawUrl}" controls autoplay></video>`;
            } else {
                fetch(file.rawUrl).then(r => r.text()).then(text => {
                    modalContent.innerHTML = `<div id="modal-text">${text}</div>`;
                });
            }
            document.getElementById('download-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = file.rawUrl; a.download = file.filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                modalContent.innerHTML = ''; document.body.style.overflow = 'auto';
            };
        });

        zoomSlider.oninput = () => document.documentElement.style.setProperty('--grid-size', zoomSlider.value + 'px');
        searchInput.oninput = (e) => { searchQuery = e.target.value; renderGallery(); };
        themeToggle.onclick = () => {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.innerText = next === 'dark' ? '☀️' : '🌙';
        };
        function loadTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', saved);
            themeToggle.innerText = saved === 'dark' ? '☀️' : '🌙';
        }
        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
                modalContent.innerHTML = ''; document.body.style.overflow = 'auto';
            }
        };

        init();
    </script>
</body>
</html>
